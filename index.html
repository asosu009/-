<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ相場スキャナー</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #0f172a; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; }
        input { 
            width: 125px; padding: 15px 5px; font-size: 32px; font-weight: bold; 
            border-radius: 12px; border: 2px solid #334155; background: #000; 
            color: #22c55e; text-align: center; box-sizing: border-box;
        }
        .separator { font-size: 40px; font-weight: bold; color: #475569; }
        .btn-group { display: grid; gap: 12px; }
        .btn { 
            padding: 20px; font-size: 20px; font-weight: bold; color: white; 
            border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .mercari { background: #ef4444; }
        .snkrdunk { background: #1e293b; border: 1px solid #475569; }
        .ebay { background: #3b82f6; }
        .reset-btn { margin-top: 30px; padding: 15px; font-size: 14px; color: #64748b; background: none; border: 1px solid #334155; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-size:18px; margin-bottom:20px;">カード番号を入力</h2>
        <div class="input-group">
            <input type="text" id="left" placeholder="000" inputmode="numeric" autofocus>
            <span class="separator">/</span>
            <input type="text" id="right" placeholder="000" inputmode="numeric">
        </div>

        <div class="btn-group">
            <button onclick="search('m')" class="btn mercari">メルカリ（売切）</button>
            <button onclick="search('s')" class="btn snkrdunk">スニダン</button>
            <button onclick="search('e')" class="btn ebay">eBay（Sold）</button>
        </div>

        <button class="reset-btn" onclick="location.reload(true)">リセット</button>
    </div>

    <script>
        const left = document.getElementById('left');
        const right = document.getElementById('right');

        function search(type) {
            const lVal = left.value.trim();
            const rVal = right.value.trim();
            
            if (!lVal || !rVal) {
                alert("番号を両方入力してください");
                return;
            }

            const cardNum = `${lVal}/${rVal}`;
            const psaQuery = encodeURIComponent(`${cardNum} PSA10`);
            const snkrQuery = encodeURIComponent(cardNum);

            let url = "";
            if (type === 'm') {
                url = `https://jp.mercari.com/search?keyword=${psaQuery}&status=sold_out`;
            } else if (type === 's') {
                url = `https://snkrdunk.com/search?keyword=${snkrQuery}`;
            } else if (type === 'e') {
                url = `https://www.ebay.com/sch/i.html?_nkw=${psaQuery}&LH_Sold=1&LH_Complete=1`;
            }
            
            window.open(url, '_blank');
        }

        left.addEventListener('input', () => {
            if (left.value.length >= 3) right.focus();
        });

        window.onload = () => {
            left.value = "";
            right.value = "";
        };
    </script>
</body>
</html>

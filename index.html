<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ相場比較 PRO</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #0f172a; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        
        .input-group { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        input { 
            width: 120px; padding: 12px 5px; font-size: 28px; font-weight: bold; 
            border-radius: 10px; border: 2px solid #334155; background: #000; 
            color: #22c55e; text-align: center; box-sizing: border-box;
        }
        .separator { font-size: 32px; font-weight: bold; color: #475569; }

        .section-title { font-size: 14px; color: #94a3b8; text-align: left; margin: 15px 0 8px 5px; font-weight: bold; border-left: 4px solid #22c55e; padding-left: 8px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn { 
            padding: 16px 5px; font-size: 17px; font-weight: bold; color: white; 
            border: none; border-radius: 12px; cursor: pointer; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .label-sub { font-size: 10px; opacity: 0.9; margin-top: 3px; font-weight: normal; }

        /* メルカリ（赤） */
        .m-btn { background: #ef4444; border-bottom: 4px solid #b91c1c; }
        /* スニダン（黒） */
        .s-btn { background: #1e293b; border: 1px solid #475569; border-bottom: 4px solid #0f172a; grid-column: span 2; }
        /* eBay（青） */
        .e-btn { background: #3b82f6; border-bottom: 4px solid #1d4ed8; }

        /* 素体用は少し明るく */
        .raw { filter: brightness(1.2); }

        .reset-btn { margin-top: 25px; padding: 12px; font-size: 13px; color: #64748b; background: none; border: 1px solid #334155; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-group">
            <input type="text" id="left" placeholder="021" inputmode="numeric" autofocus>
            <span class="separator">/</span>
            <input type="text" id="right" placeholder="025" inputmode="numeric">
        </div>

        <div class="section-title">メルカリ (売り切れ)</div>
        <div class="btn-grid">
            <button onclick="doSearch('m', 'psa')" class="btn m-btn">✨ PSA10</button>
            <button onclick="doSearch('m', 'raw')" class="btn m-btn raw">🃏 素体</button>
        </div>

        <div class="section-title">スニーカーダンク (検索)</div>
        <div class="btn-grid">
            <button onclick="doSearch('s', 'raw')" class="btn s-btn">🔍 番号でスニダン検索</button>
        </div>

        <div class="section-title">eBay (Sold / Pokemon Card固定)</div>
        <div class="btn-grid">
            <button onclick="doSearch('e', 'psa')" class="btn e-btn">✨ PSA10</button>
            <button onclick="doSearch('e', 'raw')" class="btn e-btn raw">🃏 素体</button>
        </div>

        <button class="reset-btn" onclick="location.reload(true)">画面をリセット</button>
    </div>

    <script>
        function doSearch(platform, mode) {
            const l = document.getElementById('left').value.trim();
            const r = document.getElementById('right').value.trim();
            if (!l || !r) { alert("番号を入力してください"); return; }

            const num = l + "/" + r;
            let url = "";

            if (platform === 'm') {
                const q = (mode === 'psa') ? num + " PSA10" : num;
                url = `https://jp.mercari.com/search?keyword=${encodeURIComponent(q)}&status=sold_out`;
            } 
            else if (platform === 's') {
                // スニダン：404を回避するため、公式の検索ディレクトリ形式を使用
                url = `https://snkrdunk.com/search?keyword=${encodeURIComponent(num)}`;
            } 
            else if (platform === 'e') {
                const q = (mode === 'psa') ? "Pokemon Card " + num + " PSA10" : "Pokemon Card " + num;
                url = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(q)}&LH_Sold=1&LH_Complete=1`;
            }

            window.location.href = url;
        }

        document.getElementById('left').addEventListener('input', function() {
            if (this.value.length >= 3) document.getElementById('right').focus();
        });
    </script>
</body>
</html>

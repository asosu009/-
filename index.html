<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ相場スキャナー Zoom版</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; text-align: center; background: #1a1a1a; color: white; }
        #video-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto 10px; overflow: hidden; border-radius: 15px; border: 2px solid #444; }
        #video { width: 100%; display: block; transform: scale(1.5); transform-origin: center; } /* 1.5倍ズーム */
        #guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; height: 50px; border: 3px solid #00ff00; border-radius: 8px; pointer-events: none; box-shadow: 0 0 15px rgba(0,255,0,0.5); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; font-weight: bold; text-align: center; color: white; text-decoration: none; border-radius: 12px; }
        .mercari { background: #ff0021; }
        .snkrdunk { background: #000000; border: 1px solid #444; }
        .ebay { background: #0064d2; }
        #result-box { background: #333; padding: 15px; border-radius: 10px; margin-top: 10px; }
        #result-display { font-size: 22px; font-weight: bold; color: #00ff00; }
        .hint { font-size: 14px; color: #ffcc00; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>ポケカ相場スキャナー</h3>
    <div class="hint">【コツ】20cmくらい離すとピントが合います！</div>
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="guide"></div>
    </div>

    <div id="result-box">
        <div id="result-display">緑の枠に番号を合わせる</div>
        <div id="links" style="display:none; margin-top:15px;">
            <a id="link-mercari" class="btn mercari" target="_blank">メルカリ(売切)</a>
            <a id="link-snkrdunk" class="btn snkrdunk" target="_blank">スニダン</a>
            <a id="link-ebay" class="btn ebay" target="_blank">eBay(Sold)</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultDisplay = document.getElementById('result-display');
        const links = document.getElementById('links');

        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            } 
        })
        .then(stream => { video.srcObject = stream; startScanning(); });

        function startScanning() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    // ズームされている中央部分だけを切り取って認識させる
                    canvas.width = 600;
                    canvas.height = 300;
                    const startX = (video.videoWidth - 600) / 2;
                    const startY = (video.videoHeight - 300) / 2;
                    
                    context.drawImage(video, startX, startY, 600, 300, 0, 0, 600, 300);
                    
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                    const match = text.match(/\d{3}\/\d{3}/);
                    if (match) {
                        const cardNumber = match[0];
                        resultDisplay.innerText = "認識成功: " + cardNumber;
                        updateLinks(cardNumber);
                        if (navigator.vibrate) navigator.vibrate(70);
                    }
                }
            }, 1500);
        }

        function updateLinks(num) {
            const query = encodeURIComponent(num + " PSA10");
            document.getElementById('link-mercari').href = `https://jp.mercari.com/search?keyword=${query}&status=sold_out`;
            document.getElementById('link-snkrdunk').href = `https://snkrdunk.com/v1/trading-cards/search?keyword=${query}`;
            document.getElementById('link-ebay').href = `https://www.ebay.com/sch/i.html?_nkw=${query}&LH_Sold=1&LH_Complete=1`;
            links.style.display = 'block';
        }
    </script>
</body>
</html>

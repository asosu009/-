<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ最速検索・完成版</title>
    <style>
        /* 背景色を少し変えて、更新されたか判別しやすくしました */
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #0f172a; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; }
        input { 
            width: 120px; padding: 15px 5px; font-size: 32px; font-weight: bold; 
            border-radius: 12px; border: 2px solid #334155; background: #000; 
            color: #22c55e; text-align: center; box-sizing: border-box;
        }
        .separator { font-size: 40px; font-weight: bold; color: #475569; }
        .btn-group { display: grid; gap: 12px; }
        .btn { padding: 20px; font-size: 20px; font-weight: bold; color: white; text-decoration: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .mercari { background: #ef4444; }
        .snkrdunk { background: #1e293b; border: 1px solid #475569; }
        .ebay { background: #3b82f6; }
        .reset-btn { margin-top: 30px; padding: 15px; font-size: 14px; color: #64748b; background: none; border: 1px solid #334155; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-size:18px; margin-bottom:20px;">番号を入力</h2>
        
        <div class="input-group">
            <input type="text" id="left" placeholder="000" inputmode="numeric" autofocus>
            <span class="separator">/</span>
            <input type="text" id="right" placeholder="000" inputmode="numeric">
        </div>

        <div class="btn-group">
            <a id="link-m" href="#" class="btn mercari" target="_blank">メルカリ（売切）</a>
            <a id="link-s" href="#" class="btn snkrdunk" target="_blank">スニダン</a>
            <a id="link-e" href="#" class="btn ebay" target="_blank">eBay（Sold）</a>
        </div>

        <button class="reset-btn" onclick="location.reload(true)">強制リロード</button>
    </div>

    <script>
        const left = document.getElementById('left');
        const right = document.getElementById('right');
        const m = document.getElementById('link-m');
        const s = document.getElementById('link-s');
        const e = document.getElementById('link-e');

        function updateLinks() {
            const lVal = left.value.trim();
            const rVal = right.value.trim();
            if (lVal && rVal) {
                const query = encodeURIComponent(`${lVal}/${rVal} PSA10`);
                m.href = `https://jp.mercari.com/search?keyword=${query}&status=sold_out`;
                // 404を回避する最新の検索用URL
                s.href = `https://snkrdunk.com/search?keyword=${query}`;
                e.href = `https://www.ebay.com/sch/i.html?_nkw=${query}&LH_Sold=1&LH_Complete=1`;
            }
        }

        left.addEventListener('input', () => {
            updateLinks();
            if (left.value.length >= 3) right.focus();
        });
        right.addEventListener('input', updateLinks);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ最速検索</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #121212; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        /* 入力欄：数字キーボードが出るように設定 */
        input { 
            width: 120px; padding: 15px 5px; font-size: 32px; font-weight: bold; 
            border-radius: 12px; border: 2px solid #444; background: #000; 
            color: #00ff00; text-align: center; box-sizing: border-box;
        }
        .separator { font-size: 40px; font-weight: bold; color: #777; }
        .btn-group { display: grid; gap: 12px; }
        .btn { padding: 20px; font-size: 20px; font-weight: bold; color: white; text-decoration: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .mercari { background: #ff0021; }
        .snkrdunk { background: #000; border: 1px solid #666; }
        .ebay { background: #0064d2; }
        .reset-btn { margin-top: 30px; padding: 15px; font-size: 14px; color: #777; background: none; border: 1px solid #333; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-size:16px; color:#aaa;">番号を入力</h2>
        
        <div class="input-group">
            <input type="text" id="left" placeholder="021" inputmode="numeric">
            <span class="separator">/</span>
            <input type="text" id="right" placeholder="025" inputmode="numeric">
        </div>

        <div class="btn-group">
            <a id="l-mercari" href="#" class="btn mercari" target="_blank">メルカリ（売り切れ）</a>
            <a id="l-snkrdunk" href="#" class="btn snkrdunk" target="_blank">スニダン</a>
            <a id="l-ebay" href="#" class="btn ebay" target="_blank">eBay（Sold）</a>
        </div>

        <button class="reset-btn" onclick="resetAll()">クリア</button>
    </div>

    <script>
        const left = document.getElementById('left');
        const right = document.getElementById('right');
        const m = document.getElementById('l-mercari');
        const s = document.getElementById('l-snkrdunk');
        const e = document.getElementById('l-ebay');

        function update() {
            const val = left.value + "/" + right.value;
            if (left.value && right.value) {
                const q = encodeURIComponent(val + " PSA10");
                m.href = `https://jp.mercari.com/search?keyword=${q}&status=sold_out`;
                s.href = `https://snkrdunk.com/v1/trading-cards/search?keyword=${q}`;
                e.href = `https://www.ebay.com/sch/i.html?_nkw=${q}&LH_Sold=1&LH_Complete=1`;
            }
        }

        // 3桁打ったら自動で右へ移動
        left.addEventListener('input', () => {
            update();
            if (left.value.length >= 3) right.focus();
        });
        right.addEventListener('input', update);

        function resetAll() {
            left.value = ""; right.value = "";
            left.focus();
        }
    </script>
</body>
</html>

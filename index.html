<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ最速検索 Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #121212; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        .mode-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .mode-btn { padding: 8px 15px; font-size: 14px; border-radius: 20px; border: 1px solid #555; background: #333; color: #ccc; cursor: pointer; }
        .mode-btn.active { background: #00ff00; color: black; border-color: #00ff00; font-weight: bold; }
        
        .input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input { 
            width: 120px; padding: 15px 5px; font-size: 28px; font-weight: bold; 
            border-radius: 12px; border: 2px solid #444; background: #000; 
            color: #00ff00; text-align: center; box-sizing: border-box;
        }
        .separator { font-size: 40px; font-weight: bold; color: #777; }

        .btn-group { display: grid; gap: 12px; }
        .btn { 
            padding: 20px; font-size: 20px; font-weight: bold; color: white; 
            text-decoration: none; border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .mercari { background: #ff0021; }
        .snkrdunk { background: #000; border: 1px solid #666; }
        .ebay { background: #0064d2; }
        .reset-btn { margin-top: 30px; padding: 15px; font-size: 14px; color: #777; background: none; border: 1px solid #333; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-selector">
            <div id="modeNum" class="mode-btn active" onclick="setMode('number')">数字入力</div>
            <div id="modeText" class="mode-btn" onclick="setMode('text')">英数 (プロモ)</div>
        </div>
        
        <div class="input-group">
            <input type="number" id="numLeft" placeholder="000" inputmode="numeric">
            <span class="separator">/</span>
            <input type="number" id="numRight" placeholder="000" inputmode="numeric">
        </div>

        <div class="btn-group">
            <a id="link-mercari" href="#" class="btn mercari" target="_blank">メルカリ（売切）</a>
            <a id="link-snkrdunk" href="#" class="btn snkrdunk" target="_blank">スニダン</a>
            <a id="link-ebay" href="#" class="btn ebay" target="_blank">eBay（Sold）</a>
        </div>

        <button class="reset-btn" onclick="resetAll()">すべてクリア</button>
    </div>

    <script>
        const left = document.getElementById('numLeft');
        const right = document.getElementById('numRight');
        const mLink = document.getElementById('link-mercari');
        const sLink = document.getElementById('link-snkrdunk');
        const eLink = document.getElementById('link-ebay');
        const btnNum = document.getElementById('modeNum');
        const btnText = document.getElementById('modeText');

        // モード切替
        function setMode(mode) {
            if (mode === 'number') {
                left.type = 'number'; left.inputMode = 'numeric';
                right.type = 'number'; right.inputMode = 'numeric';
                btnNum.classList.add('active'); btnText.classList.remove('active');
            } else {
                left.type = 'text'; left.inputMode = 'text';
                right.type = 'text'; right.inputMode = 'text';
                btnNum.classList.remove('active'); btnText.classList.add('active');
            }
            left.focus();
        }

        function updateLinks() {
            const lVal = left.value.trim();
            const rVal = right.value.trim();
            if (lVal && rVal) {
                const query = encodeURIComponent(`${lVal}/${rVal} PSA10`);
                mLink.href = `https://jp.mercari.com/search?keyword=${query}&status=sold_out`;
                sLink.href = `https://snkrdunk.com/v1/trading-cards/search?keyword=${query}`;
                eLink.href = `https://www.ebay.com/sch/i.html?_nkw=${query}&LH_Sold=1&LH_Complete=1`;
            }
        }

        function resetAll() {
            left.value = ""; right.value = "";
            left.focus();
        }

        left.addEventListener('input', updateLinks);
        right.addEventListener('input', updateLinks);
        
        // 自動移動（数字モードの時のみ）
        left.addEventListener('input', () => {
            if (left.type === 'number' && left.value.length >= 3) right.focus();
        });
    </script>
</body>
</html>

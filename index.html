<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポケカ最速検索 Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #121212; color: white; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; }
        
        /* 入力エリア：1つに統合 */
        .input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
        }
        input { 
            width: 100%; padding: 20px; font-size: 32px; font-weight: bold; 
            border-radius: 12px; border: 2px solid #444; background: #000; 
            color: #00ff00; text-align: center; box-sizing: border-box;
            letter-spacing: 2px;
        }
        /* スラッシュを最初から表示するためのヒント */
        input::placeholder { color: #333; }

        .btn-group { display: grid; gap: 12px; }
        .btn { 
            padding: 20px; font-size: 20px; font-weight: bold; color: white; 
            text-decoration: none; border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .mercari { background: #ff0021; }
        .snkrdunk { background: #000; border: 1px solid #666; }
        .ebay { background: #0064d2; }
        
        .reset-btn { margin-top: 30px; padding: 15px; font-size: 14px; color: #777; background: none; border: 1px solid #333; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="font-size:16px; color:#aaa;">番号を入力（スラッシュ前後を打つだけ）</h2>
        
        <div class="input-wrapper">
            <input type="text" id="cardNumber" value="/" autofocus>
        </div>

        <div class="btn-group">
            <a id="link-mercari" href="#" class="btn mercari" target="_blank">メルカリ（売切）</a>
            <a id="link-snkrdunk" href="#" class="btn snkrdunk" target="_blank">スニダン</a>
            <a id="link-ebay" href="#" class="btn ebay" target="_blank">eBay（Sold）</a>
        </div>

        <button class="reset-btn" onclick="resetAll()">すべてクリア</button>
    </div>

    <script>
        const input = document.getElementById('cardNumber');
        const mLink = document.getElementById('link-mercari');
        const sLink = document.getElementById('link-snkrdunk');
        const eLink = document.getElementById('link-ebay');

        // ページ読み込み時にカーソルをスラッシュの前に置く
        window.onload = () => {
            input.setSelectionRange(0, 0);
        };

        function updateLinks() {
            const val = input.value.trim();
            // スラッシュが含まれていて、かつ前後に文字がある場合のみリンク生成
            if (val.includes('/') && val.length > 1) {
                const query = encodeURIComponent(val + " PSA10");
                mLink.href = `https://jp.mercari.com/search?keyword=${query}&status=sold_out`;
                sLink.href = `https://snkrdunk.com/v1/trading-cards/search?keyword=${query}`;
                eLink.href = `https://www.ebay.com/sch/i.html?_nkw=${query}&LH_Sold=1&LH_Complete=1`;
            }
        }

        function resetAll() {
            input.value = "/";
            input.focus();
            input.setSelectionRange(0, 0);
        }

        input.addEventListener('input', updateLinks);

        // スラッシュを消さないように制御
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '/') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
